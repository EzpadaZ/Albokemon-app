name: albokemon_app
description: "Albokemon FrontEnd"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  socket_io_client: ^3.1.4
  loading_animation_widget: ^1.3.0
  just_audio: ^0.10.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
   - assets/image/logo.png
   - assets/bgm/menu.mp3
   - assets/bgm/battle.mp3
   - assets/image/trainer_front.png
   - assets/image/trainer_back.png
   - assets/image/main_bg.jpg
   - assets/image/snorlax_sleeping.gif
   - assets/image/battle_bg.jpg
   - assets/image/lobby_bg.jpg
   - assets/sfx/button_click.wav
   - assets/sfx/self_hurt.wav
   - assets/sfx/attack_opponent.wav

  fonts:
   - family: Monocraft
     fonts:
       - asset: assets/fonts/Monocraft.ttf
   - family: Fipps
     fonts:
       - asset: assets/fonts/Fipps-Regular.otf